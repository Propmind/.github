# Caller workflow for Propmind/control-panel-ui
# Copy to: .github/workflows/pr-review.yml in the control-panel-ui repository
name: PR Review

on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  auto-review:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.type != 'Bot'
    uses: Propmind/.github/.github/workflows/pr-review.yml@main
    with:
      pr_number: ${{ github.event.pull_request.number }}
      convention_docs: "AGENTS.md,DRAWER-PATTERNS.md,CARD-PATTERNS.md,LAYOUT-STABILITY.md,PAGINATION-PATTERNS.md,FINANCIAL-RULES.md,TESTING_GUIDE.md"
      service_type: react-typescript
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}

  comment-review:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/review') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    uses: Propmind/.github/.github/workflows/pr-review.yml@main
    with:
      pr_number: ${{ github.event.issue.number }}
      convention_docs: "AGENTS.md,DRAWER-PATTERNS.md,CARD-PATTERNS.md,LAYOUT-STABILITY.md,PAGINATION-PATTERNS.md,FINANCIAL-RULES.md,TESTING_GUIDE.md"
      service_type: react-typescript
      mode: comment
      comment_author: ${{ github.event.comment.user.login }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
